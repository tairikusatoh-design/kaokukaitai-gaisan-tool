<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>解体概算ツール</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
.container {
  max-width: 400px;
  margin: auto;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
.result {
  font-size: 20px;
  font-weight: bold;
  margin-top: 20px;
}
.note {
  font-size: 12px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>解体費用 概算ツール</h2>

<label>延床面積（㎡）</label>
<input type="number" id="area" placeholder="例：100">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

<div class="note">
通常住宅の概算を基準にしています。<br>
石綿含有や工場、特殊施設等はお問い合わせください。
</div>

</div>

<script>
function calc() {
  let area = document.getElementById("area").value;

  if (!area) {
    alert("面積を入力してください");
    return;
  }

  // 基準単価（円/㎡）
  let lowUnit = 11080;
  let highUnit = 13090;

  // 基準計算
  let low = area * lowUnit;
  let high = area * highUnit;

  // 裏レンジ（±5%）
  let finalLow = low * 0.95;
  let finalHigh = high * 1.05;

  // 万円表示
  finalLow = Math.round(finalLow / 10000);
  finalHigh = Math.round(finalHigh / 10000);

  document.getElementById("result").innerHTML =
    "概算金額：約 " + finalLow + "万〜" + finalHigh + "万円";
}
</script>

</body>
</html>
